services:
  pixelplein:
    image: node:24-slim
    working_dir: /app
    command: sh -c "npm install --production && node server/index.js"
    ports:
      - "3000:3000"
    volumes:
      - .:/app:ro
      - photos:/app/photos
      - data:/app/data
      - cache:/app/cache
      - slide-assets:/app/slide-assets
      - submission-assets:/app/submission-assets
    environment:
      - NODE_ENV=production
      # Uncomment and set to expose the correct external URL in QR codes:
      # - PUBLIC_BASE_URL=http://192.168.1.10:3000
    restart: unless-stopped

volumes:
  photos:
  data:
  cache:
  slide-assets:
  submission-assets:
