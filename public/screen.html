<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelPlein</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/screen.css">
<link rel="stylesheet" href="/styles/screen-overlays.css">
<link rel="stylesheet" href="/styles/screen-layouts.css">
<link rel="stylesheet" href="/styles/screen-slides.css">
</head>
<body>

<!-- Shown until the first photos are ready -->
<div id="waiting">
  <div class="waiting-icon">
    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="9" height="9" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/><rect x="2" y="13" width="9" height="9" rx="2"/><rect x="13" y="13" width="9" height="9" rx="2"/></svg>
  </div>
  <div class="waiting-title">Wachten op foto's…</div>
  <div class="waiting-sub">
    Foto's verschijnen hier zodra ze zijn geüpload
    <span class="waiting-dots"><span></span><span></span><span></span></span>
  </div>
</div>

<div id="sync-status"></div>
<div id="display"></div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // When a new SW version activates, reload the page so all JS modules
      // are served fresh from the new shell cache.
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'activated') location.reload();
        });
      });
    }).catch(() => {});
  }
</script>
<script type="module" src="/screen/app.js"></script>
</body>
</html>
