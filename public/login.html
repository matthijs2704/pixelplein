<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelPlein Login</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles/base.css">
<link rel="stylesheet" href="/styles/login.css">
</head>
<body>
  <div class="card">
    <div class="brand">PixelPlein</div>
    <div class="sub" id="subtitle">Sign in to manage screens, photos, and playlists.</div>

    <div class="error" id="login-error"></div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="login-username">Username</label>
        <input id="login-username" name="username" type="text" required>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required>
      </div>
      <label class="check-row">
        <input id="login-remember" type="checkbox">
        Remember me (30 days)
      </label>
      <button class="btn" type="submit">Sign in</button>
    </form>

    <form id="setup-form" autocomplete="off" style="display:none">
      <div class="field">
        <label for="setup-username">First admin username</label>
        <input id="setup-username" type="text" required>
      </div>
      <div class="field">
        <label for="setup-password">Password</label>
        <input id="setup-password" type="password" required>
      </div>
      <div class="field">
        <label for="setup-password-confirm">Confirm password</label>
        <input id="setup-password-confirm" type="password" required>
      </div>
      <button class="btn" type="submit">Create account</button>
    </form>

    <button class="btn btn-ghost" id="oidc-btn" style="display:none" type="button">Sign in with SSO</button>
    <div class="muted" id="login-hint"></div>
  </div>

  <script type="module" src="/login/app.js"></script>
</body>
</html>
