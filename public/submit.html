<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Photo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/submit.css">
</head>
<body>
  <div class="wrap">
    <h1 class="title" id="event-title">Share your moment</h1>
    <p class="sub">Upload a photo or message for the live event wall. Submissions are reviewed before they appear.</p>

    <div class="card" id="submit-card">
      <form id="submit-form">
        <div class="row">
          <label id="submitter-label" for="submitter-value">Name</label>
          <input id="submitter-value" name="submitterValue" type="text" maxlength="120" placeholder="Optional">
        </div>

        <div class="row">
          <label for="message">Message (optional)</label>
          <textarea id="message" name="message" maxlength="800" placeholder="Write a short message..."></textarea>
        </div>

        <div class="row photo-box">
          <label for="photo">Photo</label>
          <div class="photo-row">
            <input id="photo" name="photo" type="file" accept="image/*" capture="environment">
            <button type="button" id="clear-photo" class="btn btn-secondary hidden">Remove photo</button>
          </div>
          <img id="photo-preview" class="photo-preview" alt="Preview">
        </div>

        <div class="row submit-actions">
          <button id="submit-btn" class="btn" type="submit">Submit</button>
          <span class="submit-hint">Thanks! We'll review it shortly.</span>
        </div>
      </form>

      <div id="status" class="status"></div>
    </div>

    <div id="closed-message" class="card hidden">
      Submissions are currently closed.
    </div>
  </div>

  <script type="module" src="/submit/app.js"></script>
</body>
</html>
