<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deel jouw moment</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/submit.css">
</head>
<body>
  <div class="wrap">
    <h1 class="title" id="event-title">Deel jouw moment</h1>
    <p class="sub">Upload een foto of bericht voor de live event muur. Inzendingen worden beoordeeld voordat ze verschijnen.</p>

    <div class="card" id="submit-card">
      <form id="submit-form">
        <div class="row">
          <label for="message">Bericht (optioneel)</label>
          <textarea id="message" name="message" maxlength="800" placeholder="Schrijf een kort bericht..."></textarea>
        </div>

        <div class="row">
          <label id="submitter-label" for="submitter-value">Naam</label>
          <input id="submitter-value" name="submitterValue" type="text" maxlength="120" placeholder="Optioneel">
        </div>

        <div class="row">
          <label for="photo">Foto</label>
          <div class="photo-row photo-box">
            <input id="photo" name="photo" type="file" accept="image/*">
            <button type="button" id="clear-photo" class="btn btn-secondary hidden">Foto verwijderen</button>
          </div>
          <img id="photo-preview" class="photo-preview" alt="Preview">
        </div>

        <div class="row submit-actions" style="width: 100%; margin-top: 2rem;">
          <button id="submit-btn" class="btn" type="submit" style="width: 100%">Versturen</button>
        </div>
      </form>

      <div id="status" class="status"></div>
    </div>

    <div id="closed-message" class="card hidden">
      Je kunt op dit moment geen foto's insturen.
    </div>
  </div>

  <script type="module" src="/submit/app.js"></script>
</body>
</html>
